<!DOCTYPE html>
<html>
<head><title>Video Test</title></head>
<body style="background:#000;color:#fff;font-family:sans-serif">
<h1>Video Test</h1>
<video id="v" autoplay muted loop playsinline width="360" height="640" style="border:2px solid red">
  <source src="/media/hair-approach/showreel.mp4" type="video/mp4">
</video>
<pre id="log"></pre>
<script>
var v = document.getElementById('v');
var log = document.getElementById('log');
function update() {
  log.textContent = JSON.stringify({
    readyState: v.readyState,
    networkState: v.networkState,
    paused: v.paused,
    currentTime: v.currentTime.toFixed(1),
    duration: v.duration,
    error: v.error ? v.error.code : null,
    src: v.currentSrc
  }, null, 2);
}
setInterval(update, 500);
v.addEventListener('loadeddata', function() { log.textContent += '\nLOADED DATA EVENT'; });
v.addEventListener('error', function() { log.textContent += '\nERROR: ' + (v.error ? v.error.message : 'unknown'); });
v.addEventListener('stalled', function() { log.textContent += '\nSTALLED EVENT'; });
</script>
</body>
</html>
