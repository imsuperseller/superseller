services:
  waha:
    container_name: waha
    image: devlikeapro/waha-plus:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      # NOWEB Engine - No browser/PC needed
      WAHA_ENGINE: "NOWEB"
      WHATSAPP_DEFAULT_ENGINE: "NOWEB"
      
      # API Configuration
      WAHA_API_KEY: "${WAHA_API_KEY:-${WAHA_API_KEY}}"
      
      # Session Management
      WAHA_SESSION_MODE: "auto"
      
      # Logging
      LOG_LEVEL: "info"
      
      # Timezone
      TZ: "America/Chicago"
      
      # Optional: Dashboard (if needed)
      WAHA_DASHBOARD_USERNAME: "admin"
      WAHA_DASHBOARD_PASSWORD: "${WAHA_DASHBOARD_PASSWORD}"
      WHATSAPP_SWAGGER_ENABLED: "true"
      WHATSAPP_SWAGGER_USERNAME: "admin"
      WHATSAPP_SWAGGER_PASSWORD: "${WAHA_DASHBOARD_PASSWORD}"
      
      # Performance
      NODE_OPTIONS: "--max-old-space-size=4096"
      PUPPETEER_SKIP_DOWNLOAD: "True"
      
    volumes:
      # Sessions persist here - WhatsApp login stays active
      - ./sessions:/app/.sessions
      # Data storage
      - ./data:/app/data
    networks:
      - n8n_n8n-network

networks:
  n8n_n8n-network:
    external: true

