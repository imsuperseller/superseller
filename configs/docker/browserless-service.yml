# Browserless Service Configuration
# Add this service block to your docker-compose.yml file

  browserless:
    image: browserless/chromium:latest
    container_name: browserless_rensto
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      # Authentication token (change this to a secure random string)
      - TOKEN=browserless-rensto-$(openssl rand -hex 16)
      # Performance settings
      - CONCURRENT=10
      - MAX_CONCURRENT=50
      - QUEUE_LENGTH=100
      # Pre-boot Chrome for faster startup
      - PREBOOT_CHROME=true
      # Timezone
      - TZ=America/Chicago
      # Connection settings
      - KEEP_ALIVE=true
      - MAX_CONCURRENT_SESSIONS=10
      # Resource limits
      - CHROME_REFRESH_TIME=3600000
      - MAX_CPU_PERCENT=80
      - MAX_MEMORY_PERCENT=80
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
