services:
  n8n_rensto:
    image: n8nio/n8n:2.3.1
    container_name: n8n_rensto
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - GENERIC_TIMEZONE=${TZ}
      - N8N_EDITOR_BASE_URL=https://${N8N_HOST}/
      - N8N_SECURE_COOKIE=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_METRICS=true
      - N8N_LOG_LEVEL=info
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - NODES_EXCLUDE=
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - HIGGSFIELD_KEY_ID=${HIGGSFIELD_KEY_ID}
      - HIGGSFIELD_KEY_SECRET=${HIGGSFIELD_KEY_SECRET}
    volumes:
      - n8n_n8n_n8n_data:/home/node/.n8n
      - ./ffmpeg-static:/usr/local/bin/ffmpeg-static:ro
    networks:
      - n8n-network

  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless_rensto
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - TOKEN=browserless-rensto-1a5f380127a79e645a45ca5f83cb11dc
      - CONCURRENT=10
      - MAX_CONCURRENT=50
      - QUEUE_LENGTH=100
      - PREBOOT_CHROME=true
      - TZ=${TZ}
      - KEEP_ALIVE=true
      - MAX_CONCURRENT_SESSIONS=10
      - CHROME_REFRESH_TIME=3600000
      - MAX_CPU_PERCENT=80
      - MAX_MEMORY_PERCENT=80
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  n8n-network:
    driver: bridge

volumes:
  n8n_n8n_n8n_data:
    external: true
