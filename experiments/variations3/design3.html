
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dashboard Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Inter, system-ui, sans-serif;
            background: #f8fafc;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .dashboard-card {
            background: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            border: 1px solid #f1f5f9
            
            
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            font-size: 1.125rem;
            background: #eff6ff; color: #2563eb
            
            
        }
        
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }
        
        .card-subtitle {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        
        .card-content {
            font-size: 1.1rem;
            color: undefined;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        .card-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            padding: 1rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-primary {
            background: #4a5568;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: undefined;
        }
        
        .btn-secondary:hover {
            background: undefined;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            font-size: 0.875rem;
            color: #475569;
        }
        
        .metric-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <div class="card-header">
            <div class="card-icon">📊</div>
            <div>
                <h2 class="card-title">Analytics Dashboard</h2>
                <p class="card-subtitle">Modern Design Approach</p>
            </div>
        </div>
        
        <div class="card-content">
            <p>Track your key performance indicators with our comprehensive analytics dashboard. Monitor trends, identify opportunities, and make data-driven decisions.</p>
        </div>
        
        <div class="metric">
            <span class="metric-label">Monthly Revenue</span>
            <span class="metric-value">$45,230</span>
        </div>
        <div class="metric">
            <span class="metric-label">Conversion Rate</span>
            <span class="metric-value">3.2%</span>
        </div>
        <div class="metric">
            <span class="metric-label">Active Users</span>
            <span class="metric-value">1,847</span>
        </div>
        
        <div class="card-actions">
            <button class="btn btn-primary">View Details</button>
            <button class="btn btn-secondary">Export Data</button>
        </div>
    </div>
</body>
</html>
