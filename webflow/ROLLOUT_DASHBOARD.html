<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rensto Brand System Rollout Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #110d28;
            color: #fffff3;
            padding: 20px;
            line-height: 1.6;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(26, 22, 47, 0.9);
            border-radius: 12px;
            border: 2px solid rgba(254, 61, 81, 0.3);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #1eaef7 0%, #5ffbfd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(26, 22, 47, 0.9);
            border: 2px solid rgba(254, 61, 81, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 3rem;
            font-weight: 700;
            color: #5ffbfd;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #b0bec5;
            font-size: 0.9rem;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(26, 22, 47, 0.9);
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
            border: 2px solid rgba(254, 61, 81, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #fe3d51 0%, #bf5700 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .section {
            margin-bottom: 30px;
            background: rgba(26, 22, 47, 0.9);
            border-radius: 12px;
            padding: 25px;
            border: 2px solid rgba(254, 61, 81, 0.2);
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #5ffbfd;
            font-weight: 700;
        }

        .page-list {
            display: grid;
            gap: 15px;
        }

        .page-item {
            background: rgba(17, 13, 40, 0.9);
            border: 2px solid rgba(94, 251, 253, 0.2);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .page-item:hover {
            border-color: #5ffbfd;
            transform: translateY(-2px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .page-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fffff3;
        }

        .page-path {
            color: #b0bec5;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .page-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-complete {
            background: rgba(94, 251, 253, 0.2);
            color: #5ffbfd;
            border: 1px solid #5ffbfd;
        }

        .status-partial {
            background: rgba(254, 61, 81, 0.2);
            color: #fe3d51;
            border: 1px solid #fe3d51;
        }

        .status-pending {
            background: rgba(176, 190, 197, 0.2);
            color: #b0bec5;
            border: 1px solid #b0bec5;
        }

        .sections-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .section-badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .section-verified {
            background: rgba(94, 251, 253, 0.2);
            color: #5ffbfd;
            border: 1px solid #5ffbfd;
        }

        .section-pending {
            background: rgba(176, 190, 197, 0.1);
            color: #b0bec5;
            border: 1px solid rgba(176, 190, 197, 0.3);
        }

        .icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .icon-check {
            background: #5ffbfd;
        }

        .icon-pending {
            background: #b0bec5;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #fe3d51 0%, #bf5700 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(254, 61, 81, 0.4);
            transition: transform 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(254, 61, 81, 0.6);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid rgba(254, 61, 81, 0.3);
            background: rgba(26, 22, 47, 0.9);
            color: #fffff3;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(254, 61, 81, 0.2);
            border-color: #fe3d51;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>🚀 Brand System Rollout Dashboard</h1>
            <p style="color: #b0bec5;">Track verification progress across all pages and sections</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <!-- Stats populated by JS -->
        </div>

        <div class="section">
            <div class="section-title">📊 Overall Progress</div>
            <div class="progress-bar">
                <div class="progress-fill" id="overallProgress" style="width: 0%">0%</div>
            </div>
            <div style="margin-top: 10px; color: #b0bec5;">
                <span id="overallStats"></span>
            </div>
        </div>

        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="section-title">📄 Pages Status</div>
                <div class="filters">
                    <button class="filter-btn active" onclick="filterPages('all')">All</button>
                    <button class="filter-btn" onclick="filterPages('complete')">✅ Complete</button>
                    <button class="filter-btn" onclick="filterPages('partial')">🟡 Partial</button>
                    <button class="filter-btn" onclick="filterPages('pending')">⏳ Pending</button>
                </div>
            </div>
            <div class="page-list" id="pagesList">
                <!-- Pages populated by JS -->
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>

    <script>
        let allPages = {};
        let currentFilter = 'all';

        async function loadData() {
            try {
                // Try to load from verification file
                const response = await fetch('./page-verification-status.json');
                if (response.ok) {
                    allPages = await response.json();
                } else {
                    // Initialize empty state
                    allPages = initializeEmptyState();
                }
            } catch (error) {
                console.log('Using empty state - run verification tool first');
                allPages = initializeEmptyState();
            }
            
            renderDashboard();
        }

        function initializeEmptyState() {
            const pages = {
                '/marketplace': { name: 'Marketplace', path: '/marketplace', verified: false, sections: {} },
                '/subscriptions': { name: 'Subscriptions', path: '/subscriptions', verified: false, sections: {} },
                '/ready-solutions': { name: 'Ready Solutions', path: '/ready-solutions', verified: false, sections: {} },
                '/custom-solutions': { name: 'Custom Solutions', path: '/custom-solutions', verified: false, sections: {} }
            };
            
            const commonSections = ['hero', 'navigation', 'pricing-cards', 'features', 'testimonials', 'cta', 'footer'];
            Object.values(pages).forEach(page => {
                commonSections.forEach(section => {
                    page.sections[section] = { verified: false, needsFix: false, notes: '' };
                });
            });
            
            return pages;
        }

        function calculateStats() {
            const pages = Object.values(allPages);
            const totalPages = pages.length;
            const verifiedPages = pages.filter(p => p.verified).length;
            
            const totalSections = pages.reduce((sum, page) => {
                return sum + Object.keys(page.sections || {}).length;
            }, 0);
            
            const verifiedSections = pages.reduce((sum, page) => {
                return sum + Object.values(page.sections || {}).filter(s => s.verified).length;
            }, 0);
            
            const pageProgress = (verifiedPages / totalPages * 100).toFixed(1);
            const sectionProgress = (verifiedSections / totalSections * 100).toFixed(1);
            
            return {
                pages: { verified: verifiedPages, total: totalPages, progress: pageProgress },
                sections: { verified: verifiedSections, total: totalSections, progress: sectionProgress }
            };
        }

        function getPageStatus(page) {
            const sections = Object.values(page.sections || {});
            const verifiedSections = sections.filter(s => s.verified).length;
            const totalSections = sections.length;
            
            if (verifiedSections === totalSections && totalSections > 0) {
                return 'complete';
            } else if (verifiedSections > 0) {
                return 'partial';
            } else {
                return 'pending';
            }
        }

        function renderStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="number">${stats.pages.verified}/${stats.pages.total}</div>
                    <div class="label">Pages Verified</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${stats.pages.progress}%">${stats.pages.progress}%</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="number">${stats.sections.verified}/${stats.sections.total}</div>
                    <div class="label">Sections Verified</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${stats.sections.progress}%">${stats.sections.progress}%</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="number">${stats.pages.total - stats.pages.verified}</div>
                    <div class="label">Pages Remaining</div>
                </div>
                <div class="stat-card">
                    <div class="number">${stats.sections.total - stats.sections.verified}</div>
                    <div class="label">Sections Remaining</div>
                </div>
            `;
            
            const overallProgress = ((parseFloat(stats.pages.progress) + parseFloat(stats.sections.progress)) / 2).toFixed(1);
            document.getElementById('overallProgress').style.width = overallProgress + '%';
            document.getElementById('overallProgress').textContent = overallProgress + '%';
            
            document.getElementById('overallStats').textContent = 
                `${stats.pages.verified} of ${stats.pages.total} pages complete • ${stats.sections.verified} of ${stats.sections.total} sections complete`;
        }

        function renderPages() {
            const pagesList = document.getElementById('pagesList');
            const pages = Object.values(allPages);
            
            let filteredPages = pages;
            if (currentFilter === 'complete') {
                filteredPages = pages.filter(p => getPageStatus(p) === 'complete');
            } else if (currentFilter === 'partial') {
                filteredPages = pages.filter(p => getPageStatus(p) === 'partial');
            } else if (currentFilter === 'pending') {
                filteredPages = pages.filter(p => getPageStatus(p) === 'pending');
            }
            
            pagesList.innerHTML = filteredPages.map(page => {
                const status = getPageStatus(page);
                const sections = Object.entries(page.sections || {});
                const verifiedCount = sections.filter(([_, s]) => s.verified).length;
                
                let statusClass = 'status-pending';
                let statusText = '⏳ Pending';
                if (status === 'complete') {
                    statusClass = 'status-complete';
                    statusText = '✅ Complete';
                } else if (status === 'partial') {
                    statusClass = 'status-partial';
                    statusText = '🟡 Partial';
                }
                
                return `
                    <div class="page-item">
                        <div class="page-header">
                            <div>
                                <div class="page-name">${page.name}</div>
                                <div class="page-path">${page.path}</div>
                            </div>
                            <div class="page-status ${statusClass}">${statusText}</div>
                        </div>
                        <div style="margin-top: 10px; color: #b0bec5; font-size: 0.9rem;">
                            ${verifiedCount} of ${sections.length} sections verified
                        </div>
                        <div class="sections-list">
                            ${sections.map(([sectionName, section]) => `
                                <div class="section-badge ${section.verified ? 'section-verified' : 'section-pending'}">
                                    <span class="icon ${section.verified ? 'icon-check' : 'icon-pending'}"></span>
                                    ${sectionName}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterPages(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderPages();
        }

        function renderDashboard() {
            const stats = calculateStats();
            renderStats(stats);
            renderPages();
        }

        // Load data on page load
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
