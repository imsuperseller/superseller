<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יורם פרידמן - סוכנות לביטוח | בדיקת תיק ביטוח בחינם</title>
    <meta name="description" content="יורם פרידמן סוכנות לביטוח - מומחים בביטוח משכנתא, חיים ובריאות. הירשמו עכשיו לבדיקת תיק הביטוח שלכם ללא עלות.">
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- Hero Section -->
    <header class="bg-blue-900 text-white pb-16 pt-10 px-6">
        <div class="max-w-4xl mx-auto flex flex-col items-center text-center">
            <h1 class="text-4xl md:text-5xl font-black mb-6 leading-tight">
                אל תשלמו יותר מדי על ביטוח המשכנתא שלכם!
            </h1>
            <p class="text-lg md:text-xl font-medium text-blue-100 mb-8 max-w-2xl">
                יורם פרידמן וצוות המומחים שלנו יבדקו את תיק הביטוח שלכם בעזרת מערכת הר הביטוח הממשלתית, לגמרי בחינם.
            </p>
        </div>
    </header>

    <!-- Lead Form Section -->
    <section class="max-w-md mx-auto -mt-10 px-6 relative z-10">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
            <h2 class="text-2xl font-bold text-center mb-6 text-slate-800">השאירו פרטים לבדיקה חינם</h2>
            <form action="#" method="POST" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-semibold text-slate-600 mb-1">שם מלא</label>
                    <input type="text" id="name" name="name" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label for="phone" class="block text-sm font-semibold text-slate-600 mb-1">מספר טלפון</label>
                    <input type="tel" id="phone" name="phone" required pattern="05[0-9]{8}" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="050-0000000">
                </div>
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-600 mb-1">דואר אלקטרוני</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg shadow-lg hover:shadow-xl transition-all mt-4 text-lg">
                    שלחו לי פרטים
                </button>
                <p class="text-xs text-center text-slate-500 mt-4">
                    בלחיצה על הכפתור אני מאשר/ת את תנאי השימוש ומדיניות הפרטיות
                </p>
            </form>
        </div>
    </section>

    <a href="https://wa.me/972500000000" target="_blank" rel="noopener noreferrer" class="fixed bottom-6 left-6 bg-green-500 hover:bg-green-600 text-white p-4 rounded-full shadow-2xl hover:shadow-green-500/50 transition-all transform hover:scale-110 z-50 flex items-center justify-center">

</body>
</html>
