name: FB Bot Session Health

on:
  schedule:
    - cron: '8 12 * * *'     # 6:08 AM CDT
    - cron: '8 0 * * *'      # 6:08 PM CDT
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check FB Bot Health Endpoint
        id: fbbot
        continue-on-error: true
        run: |
          RESP=$(curl -sf --max-time 15 http://172.245.56.50:8082/health 2>&1)
          EXIT=$?
          if [ $EXIT -eq 0 ]; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "response=$RESP" >> $GITHUB_OUTPUT
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "response=unreachable (exit $EXIT)" >> $GITHUB_OUTPUT
          fi

      - name: Check Webhook Server
        id: webhook
        continue-on-error: true
        run: |
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 http://172.245.56.50:8082/health 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT

      - name: Check GoLogin Proxy
        id: gologin
        continue-on-error: true
        run: |
          # Check if GoLogin API is reachable (just DNS/connectivity)
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 https://api.gologin.com/browser/v2 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT

      - name: Check Cookie Monitor PM2
        id: cookie
        continue-on-error: true
        run: |
          # Verify PM2 processes are running by checking the webhook-server port
          # If webhook-server is up, PM2 is managing processes
          curl -sf --max-time 10 http://172.245.56.50:8082/health > /dev/null 2>&1 && echo "pm2=running" >> $GITHUB_OUTPUT || echo "pm2=unknown" >> $GITHUB_OUTPUT

      - name: Generate Report
        id: report
        run: |
          ISSUES=0

          FB_ICON=$([[ "${{ steps.fbbot.outputs.status }}" == "healthy" ]] && echo "✅" || echo "❌")
          GOLOGIN_ICON=$([[ "${{ steps.gologin.outputs.code }}" =~ ^(200|401|403)$ ]] && echo "✅" || echo "❌")

          if [[ "${{ steps.fbbot.outputs.status }}" != "healthy" ]]; then
            ISSUES=$((ISSUES + 1))
          fi
          if [[ ! "${{ steps.gologin.outputs.code }}" =~ ^(200|401|403)$ ]]; then
            ISSUES=$((ISSUES + 1))
          fi

          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

          echo "## 🤖 FB Bot Session Health — $(date +%Y-%m-%d %H:%M)"
          echo ""
          echo "| Component | Status |"
          echo "|-----------|--------|"
          echo "| FB Bot (8082) | $FB_ICON |"
          echo "| GoLogin API | $GOLOGIN_ICON (HTTP ${{ steps.gologin.outputs.code }}) |"
          echo "| PM2 Processes | ${{ steps.cookie.outputs.pm2 }} |"
          echo ""
          echo "### Bot Response"
          echo '```'
          echo "${{ steps.fbbot.outputs.response }}" | head -10
          echo '```'

      - name: Create Issue on Failure
        if: steps.report.outputs.issues != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 FB Bot Down — ${new Date().toISOString().slice(0,10)}`,
              body: `FB Marketplace Bot health check failed.\n\n**Impact:** UAD and MissParty listings are NOT being generated.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ops-alert', 'fb-bot']
            });
