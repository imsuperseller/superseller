name: SSL Certificate Expiry Check

on:
  schedule:
    - cron: '33 16 * * 2'    # Tuesday 10:33 AM CDT
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check SSL Certificates
        id: ssl
        run: |
          ISSUES=0
          REPORT=""

          for DOMAIN in superseller.agency admin.superseller.agency api.superseller.agency rensto.com n8n.superseller.agency; do
            EXPIRY=$(echo | openssl s_client -servername "$DOMAIN" -connect "$DOMAIN:443" 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)

            if [ -z "$EXPIRY" ]; then
              REPORT="$REPORT\n| $DOMAIN | ❌ Could not retrieve certificate |"
              ISSUES=$((ISSUES + 1))
              continue
            fi

            EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %H:%M:%S %Y %Z" "$EXPIRY" +%s 2>/dev/null)
            NOW_EPOCH=$(date +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

            if [ "$DAYS_LEFT" -lt 14 ]; then
              REPORT="$REPORT\n| $DOMAIN | ❌ **$DAYS_LEFT days** (expires $EXPIRY) |"
              ISSUES=$((ISSUES + 1))
            elif [ "$DAYS_LEFT" -lt 30 ]; then
              REPORT="$REPORT\n| $DOMAIN | ⚠️ $DAYS_LEFT days (expires $EXPIRY) |"
              ISSUES=$((ISSUES + 1))
            else
              REPORT="$REPORT\n| $DOMAIN | ✅ $DAYS_LEFT days |"
            fi
          done

          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

          echo "## 🔒 SSL Certificate Check — $(date +%Y-%m-%d)"
          echo ""
          echo "| Domain | Expiry |"
          echo "|--------|--------|"
          echo -e "$REPORT"

      - name: Create Issue on Expiring Certs
        if: steps.ssl.outputs.issues != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.ssl.outputs.issues }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 SSL Alert: ${count} certificate(s) expiring soon — ${new Date().toISOString().slice(0,10)}`,
              body: `Weekly SSL check found certificates expiring within 30 days.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ops-alert', 'ssl']
            });
