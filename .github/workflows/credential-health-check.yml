name: Weekly Credential Health Check

on:
  schedule:
    - cron: '42 16 * * 1'    # Monday 10:42 AM CDT (UTC-6)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Worker
        id: worker
        continue-on-error: true
        run: |
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 http://172.245.56.50:3002/api/health 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT
          [[ "$HTTP" == "200" ]] && echo "status=✅" >> $GITHUB_OUTPUT || echo "status=❌ ($HTTP)" >> $GITHUB_OUTPUT

      - name: Check Web
        id: web
        continue-on-error: true
        run: |
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 https://superseller.agency/api/health 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT
          [[ "$HTTP" == "200" ]] && echo "status=✅" >> $GITHUB_OUTPUT || echo "status=❌ ($HTTP)" >> $GITHUB_OUTPUT

      - name: Check Ollama
        id: ollama
        continue-on-error: true
        run: |
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 http://172.245.56.50:11434/api/tags 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT
          [[ "$HTTP" == "200" ]] && echo "status=✅" >> $GITHUB_OUTPUT || echo "status=❌ ($HTTP)" >> $GITHUB_OUTPUT

      - name: Check WAHA
        id: waha
        continue-on-error: true
        run: |
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 http://172.245.56.50:3000/api/sessions 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT
          [[ "$HTTP" == "200" ]] && echo "status=✅" >> $GITHUB_OUTPUT || echo "status=❌ ($HTTP)" >> $GITHUB_OUTPUT

      - name: Check FB Bot
        id: fbbot
        continue-on-error: true
        run: |
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 http://172.245.56.50:8082/health 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT
          [[ "$HTTP" == "200" ]] && echo "status=✅" >> $GITHUB_OUTPUT || echo "status=❌ ($HTTP)" >> $GITHUB_OUTPUT

      - name: Check n8n
        id: n8n
        continue-on-error: true
        run: |
          HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 10 http://172.245.56.50:5678/healthz 2>/dev/null) || HTTP="000"
          echo "code=$HTTP" >> $GITHUB_OUTPUT
          [[ "$HTTP" == "200" ]] && echo "status=✅" >> $GITHUB_OUTPUT || echo "status=❌ ($HTTP)" >> $GITHUB_OUTPUT

      - name: Generate Report
        id: report
        run: |
          HEALTHY=0
          TOTAL=6
          for s in "${{ steps.worker.outputs.code }}" "${{ steps.web.outputs.code }}" "${{ steps.ollama.outputs.code }}" "${{ steps.waha.outputs.code }}" "${{ steps.fbbot.outputs.code }}" "${{ steps.n8n.outputs.code }}"; do
            [[ "$s" == "200" ]] && ((HEALTHY++))
          done

          echo "## 🔑 Credential Health Check — $(date +%Y-%m-%d)"
          echo ""
          echo "**$HEALTHY/$TOTAL services healthy**"
          echo ""
          echo "| Service | Status |"
          echo "|---------|--------|"
          echo "| Worker | ${{ steps.worker.outputs.status }} |"
          echo "| Web | ${{ steps.web.outputs.status }} |"
          echo "| Ollama | ${{ steps.ollama.outputs.status }} |"
          echo "| WAHA | ${{ steps.waha.outputs.status }} |"
          echo "| FB Bot | ${{ steps.fbbot.outputs.status }} |"
          echo "| n8n | ${{ steps.n8n.outputs.status }} |"

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT

      - name: Create Issue on Failures
        if: steps.report.outputs.healthy != '6'
        uses: actions/github-script@v7
        with:
          script: |
            const services = [
              { name: 'Worker', code: '${{ steps.worker.outputs.code }}' },
              { name: 'Web', code: '${{ steps.web.outputs.code }}' },
              { name: 'Ollama', code: '${{ steps.ollama.outputs.code }}' },
              { name: 'WAHA', code: '${{ steps.waha.outputs.code }}' },
              { name: 'FB Bot', code: '${{ steps.fbbot.outputs.code }}' },
              { name: 'n8n', code: '${{ steps.n8n.outputs.code }}' },
            ];
            const down = services.filter(s => s.code !== '200').map(s => `${s.name} (HTTP ${s.code})`);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔑 Credential Alert: ${down.length} service(s) unhealthy — ${new Date().toISOString().slice(0,10)}`,
              body: `Weekly credential health check found failures.\n\n**Down:** ${down.join(', ')}\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ops-alert']
            });
