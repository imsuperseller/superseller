name: Deploy API (api.superseller.agency)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/web/superseller-site/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm i -g vercel@32

      - name: Pull Vercel env (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN" || true

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.API_PROJECT_ID }}
        run: |
          cd apps/web/superseller-site
          vercel deploy --prod --token "$VERCEL_TOKEN" --confirm

      - name: Assign Domain Alias
        if: always()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Ensure alias exists; ignore error if already set
          vercel alias set api.superseller.agency api.superseller.agency --token "$VERCEL_TOKEN" || true


