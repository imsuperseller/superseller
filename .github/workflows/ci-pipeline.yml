name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      ADMIN_URL: https://admin.superseller.agency
      CI_SECRET: ${{ secrets.CI_WEBHOOK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/superseller-site/package-lock.json

      - name: Report CI Start
        if: env.CI_SECRET != ''
        run: |
          curl -s -X POST "$ADMIN_URL/api/admin/ci" \
            -H "Authorization: Bearer $CI_SECRET" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commitSha\": \"${{ github.sha }}\",
              \"commitMsg\": $(echo '${{ github.event.head_commit.message }}' | head -1 | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read().strip()))'),
              \"status\": \"running\",
              \"triggeredBy\": \"${{ github.actor }}\",
              \"workflowUrl\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" > /tmp/ci-run.json || true
          echo "CI_RUN_ID=$(python3 -c "import json; d=json.load(open('/tmp/ci-run.json')); print(d.get('run',{}).get('id',''))" 2>/dev/null)" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: apps/web/superseller-site
        run: npm ci

      - name: Prisma Generate
        working-directory: apps/web/superseller-site
        run: npx prisma generate

      - name: TypeScript Check
        id: typecheck
        working-directory: apps/web/superseller-site
        run: npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt
        continue-on-error: true

      - name: Lint
        id: lint
        working-directory: apps/web/superseller-site
        run: npm run lint 2>&1 | tee /tmp/lint-output.txt
        continue-on-error: true

      - name: Build
        id: build
        working-directory: apps/web/superseller-site
        run: npm run build 2>&1 | tee /tmp/build-output.txt
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: "ci-dummy-secret"
          NEXTAUTH_URL: "http://localhost:3000"

      - name: Report CI Result
        if: always() && env.CI_SECRET != ''
        run: |
          # Determine overall status
          STATUS="passed"
          if [ "${{ steps.build.outcome }}" != "success" ]; then STATUS="failed"; fi
          if [ "${{ steps.typecheck.outcome }}" != "success" ]; then STATUS="failed"; fi

          # Collect error log (last 50 lines of failed step)
          ERROR_LOG=""
          if [ "$STATUS" = "failed" ]; then
            if [ "${{ steps.build.outcome }}" != "success" ]; then
              ERROR_LOG=$(tail -50 /tmp/build-output.txt 2>/dev/null | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))' 2>/dev/null)
            elif [ "${{ steps.typecheck.outcome }}" != "success" ]; then
              ERROR_LOG=$(tail -50 /tmp/tsc-output.txt 2>/dev/null | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))' 2>/dev/null)
            fi
          fi

          PAYLOAD=$(cat <<ENDJSON
          {
            "id": "$CI_RUN_ID",
            "repo": "${{ github.repository }}",
            "commitSha": "${{ github.sha }}",
            "status": "$STATUS",
            "typeCheck": "${{ steps.typecheck.outcome }}",
            "lint": "${{ steps.lint.outcome }}",
            "build": "${{ steps.build.outcome }}",
            "errorLog": ${ERROR_LOG:-"null"},
            "workflowUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          ENDJSON
          )

          curl -s -X POST "$ADMIN_URL/api/admin/ci" \
            -H "Authorization: Bearer $CI_SECRET" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
