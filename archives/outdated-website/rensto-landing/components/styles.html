<!-- Rensto Global Styles Component -->
<style>
    :root {
        /* Rensto Brand Colors */
        --primary-orange: #f97316;
        --primary-blue: #3b82f6;
        --primary-gradient: linear-gradient(to right, #f97316, #3b82f6);
        --background-light: #f8fafc;
        --background-dark: #0B1318;
        --background-card: #ffffff;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --text-muted: #94a3b8;
        --border-light: #e2e8f0;
        --border-dark: rgba(255,255,255,0.08);
        --success: #10b981;
        --error: #ef4444;
        --warning: #f59e0b;
        --info: #3b82f6;
        
        /* Typography */
        --font-primary: 'Inter, system-ui, sans-serif';
        --font-mono: 'ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", Menlo, monospace';
        
        /* Spacing */
        --spacing-xs: 0.25rem;
        --spacing-sm: 0.5rem;
        --spacing-md: 1rem;
        --spacing-lg: 1.5rem;
        --spacing-xl: 2rem;
        --spacing-2xl: 3rem;
        --spacing-3xl: 4rem;
        --spacing-4xl: 6rem;
        
        /* Border Radius */
        --radius-sm: 0.25rem;
        --radius-md: 0.375rem;
        --radius-lg: 0.5rem;
        --radius-xl: 0.75rem;
        --radius-2xl: 1rem;
        --radius-full: 9999px;
        
        /* Shadows */
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        --shadow-glass: 0 10px 30px rgba(0,0,0,0.25);
        --shadow-glow: 0 0 20px rgba(47,106,146,0.3);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
        font-family: var(--font-primary); 
        background: var(--background-light); 
        color: var(--text-primary); 
        line-height: 1.6; 
    }
    
    /* Navigation Styles */
    .nav { 
        position: fixed; 
        top: 0; 
        left: 0; 
        right: 0; 
        z-index: 1030; 
        background: rgba(255, 255, 255, 0.95); 
        backdrop-filter: blur(10px); 
        border-bottom: 1px solid var(--border-light); 
        padding: var(--spacing-md) 0; 
    }
    
    .nav-wrapper { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        max-width: 1200px; 
        margin: 0 auto; 
        padding: 0 var(--spacing-lg); 
    }
    
    .nav-logo { 
        display: flex; 
        align-items: center; 
        text-decoration: none; 
        color: var(--text-primary); 
        font-weight: 700; 
        font-size: 1.5rem; 
        transition: all 0.3s; 
    }
    
    .nav-logo:hover { 
        color: var(--primary-orange); 
        transform: scale(1.05); 
    }
    
    .nav-menu { 
        display: flex; 
        align-items: center; 
        flex: 1; 
        justify-content: center; 
        margin: 0 var(--spacing-xl); 
    }
    
    .nav-menu-list { 
        display: flex; 
        align-items: center; 
        list-style: none; 
        gap: var(--spacing-xl); 
    }
    
    .nav-link { 
        color: var(--text-secondary); 
        text-decoration: none; 
        font-weight: 500; 
        padding: var(--spacing-sm) var(--spacing-md); 
        border-radius: var(--radius-lg); 
        transition: all 0.3s; 
    }
    
    .nav-link:hover { 
        color: var(--primary-orange); 
        background: rgba(249, 115, 22, 0.1); 
    }
    
    .nav-cta { 
        background: var(--primary-gradient); 
        color: white; 
        text-decoration: none; 
        font-weight: 600; 
        padding: var(--spacing-sm) var(--spacing-lg); 
        border-radius: var(--radius-lg); 
        transition: all 0.3s; 
        box-shadow: var(--shadow-md); 
    }
    
    .nav-cta:hover { 
        transform: translateY(-2px); 
        box-shadow: var(--shadow-lg); 
        color: white; 
    }
    
    /* Hero Section */
    .hero { 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        text-align: center; 
        padding: 8rem var(--spacing-lg) 3rem; 
        position: relative; 
        background: var(--background-light); 
    }
    
    .hero::before { 
        content: ''; 
        position: absolute; 
        top: 0; 
        left: 0; 
        right: 0; 
        bottom: 0; 
        background: radial-gradient(circle at 50% 50%, rgba(249, 115, 22, 0.1) 0%, transparent 70%); 
        pointer-events: none; 
    }
    
    .hero-content { 
        max-width: 900px; 
        z-index: 1; 
        position: relative; 
        margin: 0 auto; 
    }
    
    .hero-title { 
        font-size: 4rem; 
        font-weight: 700; 
        color: var(--text-primary); 
        margin-bottom: var(--spacing-xl); 
        line-height: 1.1; 
        background: var(--primary-gradient); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        background-clip: text; 
    }
    
    .hero-subtitle { 
        font-size: 1.5rem; 
        color: var(--text-secondary); 
        margin-bottom: var(--spacing-3xl); 
        line-height: 1.6; 
        max-width: 700px; 
        margin-left: auto; 
        margin-right: auto; 
    }
    
    /* Section Styles */
    .section { 
        padding: var(--spacing-4xl) 0; 
        background: var(--background-card); 
    }
    
    .section-alt { 
        background: var(--background-light); 
    }
    
    .section-container { 
        max-width: 1200px; 
        margin: 0 auto; 
        padding: 0 var(--spacing-lg); 
    }
    
    .section-title { 
        font-size: 3rem; 
        font-weight: 700; 
        color: var(--text-primary); 
        text-align: center; 
        margin-bottom: var(--spacing-xl); 
        line-height: 1.2; 
    }
    
    .section-subtitle { 
        font-size: 1.25rem; 
        color: var(--text-secondary); 
        text-align: center; 
        margin-bottom: var(--spacing-3xl); 
        max-width: 700px; 
        margin-left: auto; 
        margin-right: auto; 
        line-height: 1.6; 
    }
    
    /* Card Grid */
    .card-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
        gap: var(--spacing-xl); 
        margin-top: var(--spacing-3xl); 
        align-items: stretch; 
    }
    
    /* Pricing Cards */
    .pricing-card { 
        background: var(--background-card); 
        border: 1px solid var(--border-light); 
        border-radius: var(--radius-xl); 
        padding: var(--spacing-2xl); 
        text-align: center; 
        transition: all 0.3s; 
        position: relative; 
        overflow: hidden; 
        display: flex; 
        flex-direction: column; 
        height: 100%; 
        box-shadow: var(--shadow-md); 
    }
    
    .pricing-card:hover { 
        transform: translateY(-4px); 
        box-shadow: var(--shadow-xl); 
        border-color: var(--primary-orange); 
    }
    
    .pricing-card.popular { 
        border-color: var(--primary-orange); 
        box-shadow: var(--shadow-lg); 
        position: relative; 
    }
    
    .pricing-card.popular::before { 
        content: 'Most Popular'; 
        position: absolute; 
        top: 0; 
        left: 0; 
        right: 0; 
        background: var(--primary-gradient); 
        color: white; 
        padding: var(--spacing-sm); 
        font-size: 0.875rem; 
        font-weight: 600; 
    }
    
    .pricing-title { 
        font-size: 1.5rem; 
        font-weight: 700; 
        color: var(--text-primary); 
        margin-bottom: var(--spacing-lg); 
    }
    
    .price { 
        font-size: 3rem; 
        font-weight: 700; 
        color: var(--primary-orange); 
        margin: var(--spacing-xl) 0; 
    }
    
    .pricing-features { 
        list-style: none; 
        padding: 0; 
        margin: var(--spacing-xl) 0; 
        text-align: left; 
        flex-grow: 1; 
    }
    
    .pricing-features li { 
        color: var(--text-secondary); 
        margin-bottom: var(--spacing-md); 
        font-size: 0.95rem; 
        line-height: 1.4; 
    }
    
    .pricing-features li:before { 
        content: "✓"; 
        color: var(--success); 
        font-weight: bold; 
        margin-right: var(--spacing-sm); 
    }
    
    /* Buttons */
    .btn-primary { 
        background: var(--primary-gradient); 
        color: white; 
        padding: var(--spacing-md) var(--spacing-xl); 
        border: none; 
        border-radius: var(--radius-lg); 
        font-weight: 600; 
        font-size: 1rem; 
        cursor: pointer; 
        transition: all 0.3s; 
        text-decoration: none; 
        display: inline-flex; 
        align-items: center; 
        justify-content: center; 
        box-shadow: var(--shadow-md); 
        text-align: center; 
        min-width: 180px; 
        height: 56px; 
        line-height: 1.2; 
        white-space: nowrap; 
        margin-top: auto; 
        align-self: flex-start; 
    }
    
    .btn-primary:hover { 
        transform: translateY(-2px); 
        box-shadow: var(--shadow-lg); 
        color: white; 
    }
    
    .btn-secondary { 
        background: transparent; 
        color: var(--primary-orange); 
        padding: var(--spacing-md) var(--spacing-xl); 
        border: 2px solid var(--primary-orange); 
        border-radius: var(--radius-lg); 
        font-weight: 600; 
        font-size: 1rem; 
        cursor: pointer; 
        transition: all 0.3s; 
        text-decoration: none; 
        display: inline-flex; 
        align-items: center; 
        justify-content: center; 
        text-align: center; 
        min-width: 180px; 
        height: 56px; 
        line-height: 1.2; 
        white-space: nowrap; 
    }
    
    .btn-secondary:hover { 
        background: var(--primary-orange); 
        color: white; 
        transform: translateY(-2px); 
    }
    
    .hero-buttons { 
        display: flex; 
        gap: var(--spacing-xl); 
        justify-content: center; 
        flex-wrap: wrap; 
        margin-top: var(--spacing-xl); 
        align-items: center; 
    }
    
    /* Footer */
    .footer { 
        background: var(--background-dark); 
        padding: var(--spacing-3xl) 0 var(--spacing-xl); 
        border-top: 1px solid var(--border-dark); 
        margin-top: var(--spacing-3xl); 
    }
    
    .footer-container { 
        max-width: 1200px; 
        margin: 0 auto; 
        padding: 0 var(--spacing-lg); 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
        gap: var(--spacing-3xl); 
    }
    
    .footer-section h3 { 
        color: white; 
        font-weight: 700; 
        margin-bottom: var(--spacing-lg); 
        font-size: 1.25rem; 
    }
    
    .footer-section a { 
        color: var(--text-muted); 
        text-decoration: none; 
        display: block; 
        margin-bottom: var(--spacing-md); 
        transition: color 0.3s; 
        font-size: 1rem; 
    }
    
    .footer-section a:hover { 
        color: var(--primary-orange); 
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .hero-title { font-size: 2.5rem; }
        .nav-menu { display: none; }
        .hero-buttons { flex-direction: column; align-items: center; gap: var(--spacing-md); }
        .section-title { font-size: 2.25rem; }
        .hero { padding: 6rem var(--spacing-md) 3rem; }
        .card-grid { grid-template-columns: 1fr; gap: var(--spacing-xl); }
        .footer-container { grid-template-columns: 1fr; gap: var(--spacing-xl); }
    }
    
    @media (max-width: 480px) {
        .hero-title { font-size: 2rem; }
        .hero-subtitle { font-size: 1.25rem; }
        .section-title { font-size: 2rem; }
    }
    
    /* GSAP Animation Classes */
    .gsap-fade-in { opacity: 0; transform: translateY(20px); }
    .gsap-fade-in-up { opacity: 0; transform: translateY(30px); }
    .gsap-scale-in { opacity: 0; transform: scale(0.8); }
    .gsap-slide-in-left { opacity: 0; transform: translateX(-30px); }
    
    /* Rensto Logo Animation */
    .rensto-animate-glow {
        animation: rensto-glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes rensto-glow {
        from { filter: drop-shadow(0 0 6px rgba(249, 115, 22, 0.5)); }
        to { filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.8)); }
    }
</style>

<!-- GSAP CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
// GSAP Animations
gsap.registerPlugin(ScrollTrigger);

// Initialize animations on page load
document.addEventListener('DOMContentLoaded', function() {
    // Fade in hero elements
    gsap.from('.hero-title', {
        opacity: 0,
        y: 30,
        duration: 0.8,
        ease: 'power2.out'
    });
    
    gsap.from('.hero-subtitle', {
        opacity: 0,
        y: 20,
        duration: 0.8,
        delay: 0.2,
        ease: 'power2.out'
    });
    
    gsap.from('.hero-buttons', {
        opacity: 0,
        y: 20,
        duration: 0.8,
        delay: 0.4,
        ease: 'power2.out'
    });
    
    // Animate cards on scroll
    gsap.from('.pricing-card', {
        opacity: 0,
        y: 50,
        duration: 0.8,
        stagger: 0.2,
        ease: 'power2.out',
        scrollTrigger: {
            trigger: '.card-grid',
            start: 'top 80%'
        }
    });
    
    // Parallax effect for hero background
    gsap.to('.hero::before', {
        backgroundPosition: '50% 100%',
        ease: 'none',
        scrollTrigger: {
            trigger: '.hero',
            start: 'top bottom',
            end: 'bottom top',
            scrub: true
        }
    });
});
</script>
