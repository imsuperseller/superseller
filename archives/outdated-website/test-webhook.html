<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Webhook</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #007cba;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>Test Lead Generation Webhook</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label for="leadType">Lead Type *</label>
            <input type="text" id="leadType" name="Lead Type" value="Israeli LinkedIn leads" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="Email" value="test@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="First Name" value="Test">
        </div>
        
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="Last Name" value="User">
        </div>
        
        <div class="form-group">
            <label for="aboutBusiness">About Business</label>
            <textarea id="aboutBusiness" name="About Business">Lead generation service</textarea>
        </div>
        
        <div class="form-group">
            <label for="pricingTier">Pricing Tier</label>
            <select id="pricingTier" name="Pricing Tier">
                <option value="basic">Basic (FREE - 10 leads)</option>
                <option value="pro">Pro ($29 - 100 leads)</option>
                <option value="enterprise">Enterprise ($99 - 500 leads)</option>
            </select>
        </div>
        
        <button type="submit">Test Webhook</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing webhook...</p>';
            
            try {
                const formData = new FormData(this);
                const data = Object.fromEntries(formData.entries());
                
                console.log('Sending data:', data);
                
                const response = await fetch('http://173.254.201.134:5678/webhook-test/dd036eac-9595-40c6-9097-0e9f6adefbb1', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                console.log('Response:', result);
                
                if (response.ok && result.success) {
                    resultDiv.innerHTML = `<div class="result success">
                        <h3>✅ Success!</h3>
                        <p>${result.message}</p>
                        <p><strong>Status:</strong> ${response.status}</p>
                    </div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">
                        <h3>❌ Error</h3>
                        <p>${result.error || 'Unknown error'}</p>
                        <p><strong>Status:</strong> ${response.status}</p>
                    </div>`;
                }
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<div class="result error">
                    <h3>❌ Network Error</h3>
                    <p>${error.message}</p>
                    <p><strong>Note:</strong> Make sure the n8n workflow is active and the webhook is registered.</p>
                </div>`;
            }
        });
    </script>
</body>
</html>
