<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Generation Form</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #110d28 0%, #1a1a2e 50%, #16213e 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fe3d51, #1eaef7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 1.2rem;
            color: #b0b0b0;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e0e0;
        }
        input, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #fe3d51;
        }
        input::placeholder, textarea::placeholder {
            color: #888;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, #fe3d51, #bf5700);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 20px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(254, 61, 81, 0.4);
        }
        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .status {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #22c55e;
        }
        .status.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        .status.loading {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 AI-Powered Lead Generation</h1>
            <p>Get personalized, enriched leads with AI-generated outreach messages. No more manual research - we do the heavy lifting for you.</p>
        </div>

        <form id="leadForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required value="Ortal">
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required value="Test">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required value="ortal@test.com">
            </div>

            <div class="form-group">
                <label for="businessDescription">Tell us about your business</label>
                <textarea id="businessDescription" name="businessDescription" rows="3" required>Marketing agency for Israeli businesses in USA</textarea>
            </div>

            <div class="form-group">
                <label for="targetLeads">What type of leads are you searching for?</label>
                <input type="text" id="targetLeads" name="targetLeads" required value="Israeli marketing professionals in New York aged 24-50">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Get My 100 Leads - $49
            </button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            const formData = new FormData(e.target);
            const data = {
                'First Name': formData.get('firstName'),
                'Last Name': formData.get('lastName'),
                'Email': formData.get('email'),
                'About Business': formData.get('businessDescription'),
                'Lead Type': formData.get('targetLeads'),
                'Pricing Tier': 'basic'
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            statusDiv.innerHTML = '<div class="status loading">🔄 Sending request to n8n workflow...</div>';

            try {
                const response = await fetch('http://173.254.201.134:5678/webhook/dd036eac-9595-40c6-9097-0e9f6adefbb1', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                
                statusDiv.innerHTML = `
                    <div class="status success">
                        ✅ <strong>Success!</strong><br>
                        Request sent to n8n workflow successfully.<br>
                        <small>Check your Airtable and Slack for the generated leads.</small>
                    </div>
                `;

                console.log('Success:', result);

            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = `
                    <div class="status error">
                        ❌ <strong>Error:</strong><br>
                        ${error.message}<br>
                        <small>Check the console for more details.</small>
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Get My 100 Leads - $49';
            }
        });
    </script>
</body>
</html>
