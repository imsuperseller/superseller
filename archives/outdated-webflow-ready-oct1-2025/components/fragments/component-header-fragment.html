<!-- 🏠 HEADER FRAGMENT -->
<!-- Header navigation only - no HTML wrapper -->
<!-- For use in all pages to prevent duplication -->

<header>
    <div class="header-container">
        <div class="logo">
            <a href="/">
                <img src="https://cdn.prod.website-files.com/66c7e551a317e0e9c9f906d8/687c63b670404960220198e6_Rensto%20Logo.png" alt="Rensto">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="/marketplace">Marketplace</a></li>
                <li><a href="/custom-solutions">Custom Solutions</a></li>
                <li><a href="/subscriptions">Subscriptions</a></li>
                <li><a href="/ready-solutions">Ready Solutions</a></li>
                <li><a href="#contact" class="cta-button">Get Started</a></li>
            </ul>
        </nav>
        <button class="mobile-menu-toggle">☰</button>
    </div>
</header>

<style>
/* Header Styles */
header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(17, 13, 40, 0.95);
    backdrop-filter: blur(10px);
    padding: 1rem 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.header-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo img {
    height: 50px;
    width: auto;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 2rem;
    align-items: center;
}

nav a {
    color: var(--light-text);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.3s;
}

nav a:hover {
    color: var(--cyan);
}

.cta-button {
    background: linear-gradient(135deg, var(--orange), var(--blue));
    color: white;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: transform 0.3s, box-shadow 0.3s;
    display: inline-block;
}

.cta-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(191, 87, 0, 0.4);
}

.mobile-menu-toggle {
    display: none;
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
}

@media (max-width: 768px) {
    nav ul {
        display: none;
    }
    
    .mobile-menu-toggle {
        display: block;
    }
}
</style>

<script>
// Mobile menu toggle
document.querySelector('.mobile-menu-toggle').addEventListener('click', () => {
    const navUl = document.querySelector('nav ul');
    navUl.style.display = navUl.style.display === 'flex' ? 'none' : 'flex';
    navUl.style.flexDirection = 'column';
    navUl.style.position = 'absolute';
    navUl.style.top = '70px';
    navUl.style.left = '0';
    navUl.style.width = '100%';
    navUl.style.backgroundColor = 'rgba(17, 13, 40, 0.95)';
    navUl.style.padding = '1rem 2rem';
    navUl.style.boxShadow = '0 8px 16px rgba(0,0,0,0.2)';
});
</script>
