<!--
  WEBFLOW MARKETPLACE PAGE - STRIPE INTEGRATION

  INSTALLATION INSTRUCTIONS:
  1. Go to Webflow Designer
  2. Open "Marketplace" page
  3. Go to Page Settings → Custom Code
  4. Paste this ENTIRE code block in "Before </body> tag" section
  5. Publish the site

  BUTTON SETUP:
  Each template card should have:
  - "Download Template" button with:
    * data-template-id="template-001"
    * data-template-name="LinkedIn Lead Gen"
    * data-template-price="49"
    * data-flow-type="marketplace-template"
    * data-tier="simple"
    * class="marketplace-download-btn"

  - "Book Installation" button with:
    * data-template-id="template-001"
    * data-template-name="LinkedIn Lead Gen"
    * data-install-price="797"
    * data-flow-type="marketplace-install"
    * data-tier="template"
    * class="marketplace-install-btn"
-->

<script>
(function() {
  'use strict';

  const API_URL = 'https://api.rensto.com/api/stripe/checkout';

  // Initialize Stripe Checkout for Marketplace
  function initMarketplaceCheckout() {
    console.log('🎯 Rensto Marketplace Checkout Initialized');

    // Handle Download Template buttons
    document.querySelectorAll('.marketplace-download-btn').forEach(button => {
      button.addEventListener('click', function(e) {
        e.preventDefault();
        handleCheckout(this, 'marketplace-template');
      });
    });

    // Handle Book Installation buttons
    document.querySelectorAll('.marketplace-install-btn').forEach(button => {
      button.addEventListener('click', function(e) {
        e.preventDefault();
        handleCheckout(this, 'marketplace-install');
      });
    });
  }

  async function handleCheckout(button, flowType) {
    // Get data from button attributes
    const templateId = button.getAttribute('data-template-id');
    const templateName = button.getAttribute('data-template-name');
    const tier = button.getAttribute('data-tier') || 'simple';

    let price;
    if (flowType === 'marketplace-template') {
      price = parseInt(button.getAttribute('data-template-price')) || 49;
    } else {
      price = parseInt(button.getAttribute('data-install-price')) || 797;
    }

    // Validate required data
    if (!templateId || !templateName) {
      console.error('❌ Missing required data attributes on button');
      alert('Configuration error. Please contact support.');
      return;
    }

    // Disable button and show loading state
    const originalText = button.textContent;
    button.disabled = true;
    button.textContent = 'Processing...';
    button.style.opacity = '0.6';
    button.style.cursor = 'wait';

    try {
      console.log('💳 Creating checkout session:', {
        flowType,
        templateId,
        templateName,
        tier,
        price
      });

      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          flowType: flowType,
          productId: templateId,
          tier: tier,
          customerEmail: '', // Collected in Stripe checkout
          metadata: {
            templateName: templateName,
            templatePrice: price,
            source: 'webflow_marketplace'
          }
        }),
      });

      const data = await response.json();

      if (data.success && data.url) {
        console.log('✅ Checkout session created, redirecting to Stripe...');
        // Redirect to Stripe Checkout
        window.location.href = data.url;
      } else {
        throw new Error(data.error || 'Failed to create checkout session');
      }

    } catch (error) {
      console.error('❌ Checkout error:', error);
      alert('Unable to process checkout. Please try again or contact support.');

      // Restore button state
      button.disabled = false;
      button.textContent = originalText;
      button.style.opacity = '1';
      button.style.cursor = 'pointer';
    }
  }

  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMarketplaceCheckout);
  } else {
    initMarketplaceCheckout();
  }

  // Expose for manual initialization if needed
  window.RenstoMarketplace = { initMarketplaceCheckout };

})();
</script>

<!--
  SUCCESS! This code is now active and monitoring for checkout buttons.

  TESTING:
  1. Open browser console (F12)
  2. Look for: "🎯 Rensto Marketplace Checkout Initialized"
  3. Click a button, should see: "💳 Creating checkout session"
  4. Should redirect to Stripe Checkout

  TROUBLESHOOTING:
  - If buttons don't work: Check data attributes are set correctly
  - If API fails: Check api.rensto.com is accessible
  - If checkout doesn't open: Check browser console for errors
