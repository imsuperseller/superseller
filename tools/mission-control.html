<style>
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1a2236;
  --border: #2a3654;
  --text: #e2e8f0;
  --text-dim: #8892a8;
  --green: #00ff88;
  --green-bg: rgba(0,255,136,0.08);
  --green-border: rgba(0,255,136,0.25);
  --red: #ff3366;
  --red-bg: rgba(255,51,102,0.08);
  --red-border: rgba(255,51,102,0.25);
  --amber: #ffaa00;
  --amber-bg: rgba(255,170,0,0.08);
  --amber-border: rgba(255,170,0,0.25);
  --blue: #4488ff;
  --blue-bg: rgba(68,136,255,0.08);
  --blue-border: rgba(68,136,255,0.25);
  --gray: #555e70;
  --gray-bg: rgba(85,94,112,0.08);
  --gray-border: rgba(85,94,112,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,14,23,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; align-items: center; gap: 20px;
}
.toolbar h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, var(--green), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.toolbar .sep { width: 1px; height: 24px; background: var(--border); }
.legend {
  display: flex; gap: 14px; font-size: 11px;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.toolbar .stats {
  margin-left: auto;
  display: flex; gap: 16px;
  font-size: 11px; color: var(--text-dim);
}
.toolbar .stats span b {
  color: var(--text);
}
.zoom-controls {
  display: flex; gap: 4px;
}
.zoom-controls button {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  width: 28px; height: 28px;
  border-radius: 4px; cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.zoom-controls button:hover { background: var(--border); }

.search-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  width: 180px;
  outline: none;
}
.search-box:focus { border-color: var(--blue); }

#viewport {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  cursor: grab;
}
#viewport:active { cursor: grabbing; }

#world {
  position: absolute;
  transform-origin: 0 0;
  will-change: transform;
}

.category {
  position: absolute;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg2);
  overflow: visible;
}
.category-header {
  padding: 12px 16px 8px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.category-header .cat-icon {
  font-size: 15px;
}
.category-header .cat-count {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 8px;
}
.category-body {
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}

.node {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.node:hover {
  background: rgba(255,255,255,0.03);
}
.node.status-green { border-color: var(--green-border); background: var(--green-bg); }
.node.status-red { border-color: var(--red-border); background: var(--red-bg); }
.node.status-amber { border-color: var(--amber-border); background: var(--amber-bg); }
.node.status-blue { border-color: var(--blue-border); background: var(--blue-bg); }
.node.status-gray { border-color: var(--gray-border); background: var(--gray-bg); }

.node.highlight { box-shadow: 0 0 0 2px var(--blue); }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}
.status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse-red 2s infinite; }
.status-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.status-dot.blue { background: var(--blue); box-shadow: 0 0 4px var(--blue); }
.status-dot.gray { background: var(--gray); }

@keyframes pulse-red {
  0%, 100% { box-shadow: 0 0 6px var(--red); }
  50% { box-shadow: 0 0 14px var(--red), 0 0 28px rgba(255,51,102,0.3); }
}

.node-name {
  font-size: 11.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.node-detail {
  font-size: 9.5px;
  color: var(--text-dim);
  margin-left: auto;
  white-space: nowrap;
  flex-shrink: 0;
}

.tooltip {
  position: fixed;
  z-index: 200;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 11px;
  max-width: 340px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  line-height: 1.5;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 6px;
}
.tooltip .tt-status {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.tooltip .tt-body { color: var(--text-dim); }
.tooltip .tt-body b { color: var(--text); }

svg.connections {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: -1;
}
svg.connections line {
  stroke: var(--border);
  stroke-width: 1;
  stroke-dasharray: 4 4;
  opacity: 0.4;
}

.minimap {
  position: fixed;
  bottom: 16px; right: 16px;
  width: 200px; height: 140px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  z-index: 100;
  overflow: hidden;
}
.minimap-viewport {
  position: absolute;
  border: 1.5px solid var(--green);
  background: rgba(0,255,136,0.05);
  border-radius: 2px;
}
.minimap canvas { width: 100%; height: 100%; }

.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 220px;
  z-index: 100;
  background: rgba(10,14,23,0.9);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 6px 24px;
  display: flex; align-items: center; gap: 20px;
  font-size: 10px;
  color: var(--text-dim);
}
.bottom-bar .metric {
  display: flex; align-items: center; gap: 4px;
}
.bottom-bar .metric b { color: var(--text); }
.bottom-bar .metric .dot { width: 6px; height: 6px; border-radius: 50%; }

.missing-panel {
  position: fixed;
  bottom: 26px; left: 24px;
  z-index: 100;
  background: var(--bg2);
  border: 1px solid var(--red-border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 10px;
  max-width: 360px;
  display: none;
}
.missing-panel.visible { display: block; }
.missing-panel h3 {
  color: var(--red);
  font-size: 11px;
  margin-bottom: 6px;
  font-family: 'Space Grotesk', sans-serif;
}
.missing-panel ul { list-style: none; color: var(--text-dim); }
.missing-panel li { padding: 2px 0; }
.missing-panel li::before { content: "▸ "; color: var(--red); }

.dim { opacity: 0.25; }

</style>

const MISSING_ITEMS = [
  "Live health polling (auto-refresh every 60s with real API calls)",
  "Cost tracker dashboard (daily/monthly API spend visualization)",
  "Git status integration (uncommitted changes, branch info)",
  "SSL certificate expiry monitoring per domain",
  "Customer revenue pipeline (MRR tracking, churn)",
  "Deployment history timeline (last deploy per service, who/when)",
  "Error log aggregation (PM2 errors, API failures, 5xx counts)",
  "Credential expiry tracking (API keys with known TTLs)",
  "Schema drift detector (Prisma vs Drizzle live check)",
  "NotebookLM sync freshness per notebook",
  "Disk cleanup automation / alerts at 85%",
  "WAHA session monitoring (connection drops, re-auth needed)",
  "Performance metrics (response times, queue depths, job throughput)",
  "Dependency vulnerability scanning (npm audit results)",
  "Backup status (database dumps, R2 snapshots)",
];

let scale = 1, panX = 0, panY = 0;
let isDragging = false, dragStartX, dragStartY, dragPanX, dragPanY;
const world = document.getElementById('world');
const viewport = document.getElementById('viewport');
const tooltip = document.getElementById('tooltip');

const CATEGORY_LAYOUT = [
  { key: 'businesses', x: 40, y: 20, w: 300 },
  { key: 'infrastructure', x: 40, y: 180, w: 300 },
  { key: 'products', x: 380, y: 20, w: 330 },
  { key: 'customers', x: 380, y: 530, w: 330 },
  { key: 'integrations', x: 750, y: 20, w: 320 },
  { key: 'pm2', x: 750, y: 610, w: 320 },
  { key: 'domains', x: 1110, y: 20, w: 310 },
  { key: 'documentation', x: 1110, y: 380, w: 310 },
];

function statusClass(s) {
  return { green: 'status-green', red: 'status-red', amber: 'status-amber', blue: 'status-blue', gray: 'status-gray' }[s] || '';
}

function renderWorld() {
  let html = '';
  const nodePositions = {};

  CATEGORY_LAYOUT.forEach(cat => {
    const data = DATA[cat.key];
    const itemH = 36;
    const headerH = 42;
    const bodyPad = 20;
    const h = headerH + bodyPad + data.items.length * itemH + 10;

    html += `<div class="category" style="left:${cat.x}px;top:${cat.y}px;width:${cat.w}px;height:${h}px;" data-cat="${cat.key}">`;
    html += `<div class="category-header"><span class="cat-icon">${data.icon}</span>${data.label}<span class="cat-count">${data.items.length}</span></div>`;
    html += `<div class="category-body">`;

    data.items.forEach((item, i) => {
      const id = `${cat.key}-${i}`;
      nodePositions[id] = {
        x: cat.x + cat.w / 2,
        y: cat.y + headerH + bodyPad + i * itemH + itemH / 2
      };
      html += `<div class="node ${statusClass(item.status)}" data-id="${id}" data-name="${item.name}" data-tooltip="${encodeURIComponent(item.tooltip)}">`;
      html += `<div class="status-dot ${item.status}"></div>`;
      html += `<span class="node-name">${item.name}</span>`;
      html += `<span class="node-detail">${item.detail}</span>`;
      html += `</div>`;
    });

    html += `</div></div>`;
    cat.h = h;
  });

  world.innerHTML = html;
  updateTransform();
  updateStats();
  renderMinimap();
  renderBottomBar();
}

function updateTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const worldX = (mx - panX) / scale;
  const worldY = (my - panY) / scale;

  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.2, Math.min(3, scale * delta));

  panX = mx - worldX * newScale;
  panY = my - worldY * newScale;
  scale = newScale;
  updateTransform();
  updateMinimap();
}, { passive: false });

viewport.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragPanX = panX;
  dragPanY = panY;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX = dragPanX + (e.clientX - dragStartX);
  panY = dragPanY + (e.clientY - dragStartY);
  updateTransform();
  updateMinimap();
});
window.addEventListener('mouseup', () => { isDragging = false; });

world.addEventListener('mouseover', e => {
  const node = e.target.closest('.node');
  if (!node) return;
  const raw = decodeURIComponent(node.dataset.tooltip);
  const name = node.dataset.name;
  const dot = node.querySelector('.status-dot');
  const statusName = dot.classList.contains('green') ? 'HEALTHY' :
    dot.classList.contains('red') ? 'CRITICAL' :
    dot.classList.contains('amber') ? 'WARNING' :
    dot.classList.contains('blue') ? 'PAUSED' : 'NOT STARTED';
  const statusColor = dot.classList.contains('green') ? 'var(--green)' :
    dot.classList.contains('red') ? 'var(--red)' :
    dot.classList.contains('amber') ? 'var(--amber)' :
    dot.classList.contains('blue') ? 'var(--blue)' : 'var(--gray)';

  const lines = raw.split('\n').map(l => {
    if (l.startsWith('🔴') || l.startsWith('⚠') || l.startsWith('⏸')) return `<b>${l}</b>`;
    if (l.startsWith('•')) return `&nbsp;&nbsp;${l}`;
    return l;
  }).join('<br>');

  tooltip.innerHTML = `
    <div class="tt-title">${name}</div>
    <span class="tt-status" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44">${statusName}</span>
    <div class="tt-body">${lines}</div>
  `;
  tooltip.classList.add('visible');

  const rect = node.getBoundingClientRect();
  let tx = rect.right + 12;
  let ty = rect.top;
  if (tx + 340 > window.innerWidth) tx = rect.left - 350;
  if (ty + 200 > window.innerHeight) ty = window.innerHeight - 220;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
});
world.addEventListener('mouseout', e => {
  if (!e.target.closest('.node')) return;
  tooltip.classList.remove('visible');
});

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.node').forEach(n => {
    const match = !q || n.dataset.name.toLowerCase().includes(q) ||
      decodeURIComponent(n.dataset.tooltip).toLowerCase().includes(q);
    n.classList.toggle('dim', !match);
    n.classList.toggle('highlight', match && q.length > 0);
  });
});

document.getElementById('zoomIn').addEventListener('click', () => {
  scale = Math.min(3, scale * 1.2);
  updateTransform();
  updateMinimap();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  scale = Math.max(0.2, scale * 0.8);
  updateTransform();
  updateMinimap();
});
document.getElementById('zoomFit').addEventListener('click', () => {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  let maxX = 0, maxY = 0;
  CATEGORY_LAYOUT.forEach(c => {
    maxX = Math.max(maxX, c.x + c.w + 40);
    maxY = Math.max(maxY, c.y + (c.h || 400) + 40);
  });
  scale = Math.min(vw / maxX, vh / maxY, 1);
  panX = (vw - maxX * scale) / 2;
  panY = (vh - maxY * scale) / 2;
  updateTransform();
  updateMinimap();
});

function updateStats() {
  let total = 0, green = 0, red = 0, amber = 0, blue = 0, gray = 0;
  Object.values(DATA).forEach(cat => {
    cat.items.forEach(item => {
      total++;
      if (item.status === 'green') green++;
      else if (item.status === 'red') red++;
      else if (item.status === 'amber') amber++;
      else if (item.status === 'blue') blue++;
      else gray++;
    });
  });
  document.getElementById('statsBar').innerHTML = `
    <span><b>${total}</b> total</span>
    <span style="color:var(--green)"><b>${green}</b> healthy</span>
    <span style="color:var(--red)"><b>${red}</b> critical</span>
    <span style="color:var(--amber)"><b>${amber}</b> warning</span>
    <span style="color:var(--blue)"><b>${blue}</b> paused</span>
    <span style="color:var(--gray)"><b>${gray}</b> not started</span>
  `;
}

function renderBottomBar() {
  const bar = document.getElementById('bottomBar');
  bar.innerHTML = `
    <div class="metric"><div class="dot" style="background:var(--green)"></div><b>VPS</b> 3d17h up</div>
    <div class="metric"><div class="dot" style="background:var(--amber)"></div><b>Disk</b> 70%</div>
    <div class="metric"><div class="dot" style="background:var(--green)"></div><b>RAM</b> 3.7Gi free</div>
    <div class="metric"><div class="dot" style="background:var(--green)"></div><b>PM2</b> 3/3 online</div>
    <div class="metric"><div class="dot" style="background:var(--green)"></div><b>DB</b> healthy</div>
    <div class="metric"><div class="dot" style="background:var(--green)"></div><b>Redis</b> PONG</div>
    <div class="metric" style="margin-left:auto;color:var(--text-dim)">Pan: drag | Zoom: scroll | Search: type</div>
  `;
}

function renderMinimap() {
  const canvas = document.getElementById('minimapCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 200;
  canvas.height = 140;

  let maxX = 0, maxY = 0;
  CATEGORY_LAYOUT.forEach(c => {
    maxX = Math.max(maxX, c.x + c.w);
    maxY = Math.max(maxY, c.y + (c.h || 400));
  });

  const sx = 190 / maxX;
  const sy = 130 / maxY;
  const s = Math.min(sx, sy);

  ctx.clearRect(0, 0, 200, 140);

  CATEGORY_LAYOUT.forEach(cat => {
    const data = DATA[cat.key];
    ctx.fillStyle = '#1a2236';
    ctx.strokeStyle = '#2a3654';
    ctx.lineWidth = 0.5;
    const rx = 5 + cat.x * s;
    const ry = 5 + cat.y * s;
    const rw = cat.w * s;
    const rh = (cat.h || 300) * s;
    ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeRect(rx, ry, rw, rh);

    data.items.forEach((item, i) => {
      const dotX = rx + 4;
      const dotY = ry + 6 + i * (rh / data.items.length);
      ctx.fillStyle = { green: '#00ff88', red: '#ff3366', amber: '#ffaa00', blue: '#4488ff', gray: '#555e70' }[item.status];
      ctx.beginPath();
      ctx.arc(dotX, dotY, 1.5, 0, Math.PI * 2);
      ctx.fill();
    });
  });

  updateMinimap();
}

function updateMinimap() {
  const mv = document.getElementById('minimapViewport');
  let maxX = 0, maxY = 0;
  CATEGORY_LAYOUT.forEach(c => {
    maxX = Math.max(maxX, c.x + c.w);
    maxY = Math.max(maxY, c.y + (c.h || 400));
  });

  const sx = 190 / maxX;
  const sy = 130 / maxY;
  const s = Math.min(sx, sy);

  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const worldViewL = -panX / scale;
  const worldViewT = -panY / scale;
  const worldViewW = vw / scale;
  const worldViewH = vh / scale;

  mv.style.left = (5 + worldViewL * s) + 'px';
  mv.style.top = (5 + worldViewT * s) + 'px';
  mv.style.width = (worldViewW * s) + 'px';
  mv.style.height = (worldViewH * s) + 'px';
}

renderWorld();
setTimeout(() => document.getElementById('zoomFit').click(), 100);
window.addEventListener('resize', () => {
  updateMinimap();
});
</script>
