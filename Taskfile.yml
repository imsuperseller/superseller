version: '3'

tasks:
  validate:
    desc: Validate all n8n workflow JSON files
    cmds:
      - node scripts/n8n/validate.mjs

  push:
    desc: Deploy workflows to Tax4Us n8n Cloud (without activation)
    deps: [validate]
    cmds:
      - node scripts/n8n/push.mjs

  push-activate:
    desc: Deploy workflows to Tax4Us n8n Cloud and activate cron/approval flows
    deps: [validate]
    cmds:
      - node scripts/n8n/push.mjs --activate

  install:
    desc: Install dependencies
    cmds:
      - npm install undici

  setup:
    desc: Initial setup for Tax4Us workflow deployment
    deps: [install]
    cmds:
      - echo "Tax4Us n8n Cloud Workflow Setup"
      - echo "1. Copy env.example to .env"
      - echo "2. Set your Tax4Us n8n Cloud API key in .env"
      - echo "3. Run 'task validate' to check workflows"
      - echo "4. Run 'task push-activate' to deploy"

  help:
    desc: Show available tasks
    cmds:
      - task --list
